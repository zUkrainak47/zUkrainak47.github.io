<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UkraTimer is a modern, local-first speedcubing timer with optional Google Drive backup.">
  <meta name="theme-color" content="#0d1117">
  <meta name="google-site-verification" content="tYB2hKUPlbn806JEjrhx8fJnNwEJtE1Kv-HRcfcCDDI" />
  <title>UkraTimer</title>
  <link rel="icon" href="/timer/resources/pwa-icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0d1117;
      --surface: rgba(22, 27, 34, 0.88);
      --surface-border: rgba(255, 255, 255, 0.1);
      --text: #e6edf3;
      --text-secondary: #9da7b3;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --accent-soft: rgba(88, 166, 255, 0.18);
      --accent-warm: rgba(240, 136, 62, 0.12);
      --max-width: 780px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.6 Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior-y: none;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, var(--accent-soft), transparent 34%),
        radial-gradient(circle at top right, var(--accent-warm), transparent 24%),
        linear-gradient(180deg, #11161d 0%, var(--bg) 100%);
      pointer-events: none;
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 0;
      overflow-x: clip;
    }

    .card {
      width: 100%;
      padding: 34px;
      border-radius: 30px;
      border: 1px solid var(--surface-border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        var(--surface);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .app-icon {
      width: 92px;
      height: 92px;
      display: block;
      margin: 0 auto 20px;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 14px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(88, 166, 255, 0.12);
      color: #b6d7ff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(42px, 7vw, 70px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 18px;
    }

    .lead {
      max-width: 40ch;
      margin: 0 auto;
      color: var(--text-secondary);
      font-size: 18px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }

    .button-link,
    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--surface-border);
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .button-link {
      background: var(--accent);
      border-color: transparent;
      color: #06101d;
      font-weight: 700;
    }

    .button-link:hover {
      transform: translateY(-1px);
      background: var(--accent-hover);
    }

    .nav-link {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
    }

    .nav-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 26px;
    }

    @media (max-width: 640px) {
      .page {
        width: min(calc(100% - 20px), var(--max-width));
      }

      .card {
        padding: 24px 20px;
        border-radius: 24px;
      }

      .app-icon {
        width: 78px;
        height: 78px;
        margin-bottom: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="card">
      <img class="app-icon" src="/timer/resources/pwa-icon.svg" alt="UkraTimer icon">
      <span class="eyebrow">UkraTimer</span>
      <h1>hi!</h1>
      <p class="lead">
        i dislike cstimer's design so decided to vibecode my own. lots of polishing went into this so i'm happy to say it's up to my standards. hope you enjoy!
      </p>

      <div class="actions">
        <a class="button-link" href="/timer/">Launch UkraTimer</a>
      </div>

      <div class="footer">
        <a class="nav-link" href="/privacy.html">Privacy Policy</a>
        <a class="nav-link" href="/terms.html">Terms of Service</a>
      </div>
    </main>
  </div>
</body>

</html>
